# Render Blueprint — backend (FastAPI) cho demo TOEIC.
# Bootstrap (tải data đối tác từ Drive + seed) chạy ở BUILD → bake vào deploy →
# khởi động nhanh, không timeout. KHÔNG có dữ liệu đối tác trong repo.
services:
  - type: web
    name: toeic-backend
    runtime: python
    rootDir: backend
    plan: free
    # requirements-audio.txt (lameenc → MP3) là OPTIONAL: "|| echo" để build KHÔNG fail nếu
    # thiếu wheel; code lazy-import + fallback WAV. Base requirements giữ nguyên "0 dep".
    buildCommand: pip install -r requirements.txt && (pip install -r requirements-audio.txt || echo "audio extras optional — skipped") && python scripts/cloud_bootstrap.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # SPEC-FACTORY-020: DB bền = Supabase Postgres (free). Đặt chuỗi Session-Pooler
      # (postgresql://...pooler.supabase.com:5432/postgres, mật khẩu percent-encoded) ở
      # Render dashboard (sync:false — KHÔNG hardcode secret vào repo). Lý do bỏ SQLite:
      # disk Render free là EPHEMERAL → câu nhà máy sinh qua web MẤT sau spin-down/redeploy.
      # ⚠️ Hành vi Render khi UPDATE blueprint: env đổi sang sync:false thì GIÁ TRỊ CŨ ĐƯỢC
      # GIỮ NGUYÊN (không xoá, không crash) → nếu quên đặt dashboard, app chạy SQLite ÂM THẦM.
      # Chốt chặn: cloud_bootstrap FAIL BUILD khi chạy trên Render mà DATABASE_URL rỗng/sqlite,
      # và app log 1 dòng "DB backend: ..." lúc khởi động — verify trong Render logs sau deploy.
      - key: DATABASE_URL
        sync: false
      # Supabase Storage cho media sinh lúc RUNTIME (audio/ảnh bài Nghe — slice sau).
      # Chưa đặt cũng KHÔNG sao: media_store báo not-configured, web vẫn chạy bình thường.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: media
      - key: AUDIO_DIR
        value: ./audio_data
      # Render free không có Celery worker/Redis riêng — chạy chấm AI tự luận
      # nội tuyến lúc nộp để mạch GRADE-003 (Writing/Speaking) hoàn tất.
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"
      # Đặt = URL frontend Vercel sau khi deploy frontend (vd https://xxx.vercel.app).
      # Để trống/"*" thì CORS mở cho mọi nguồn (đủ cho demo).
      - key: ALLOWED_ORIGINS
        sync: false
      # Tài khoản admin seed lúc bootstrap. PHẢI đặt giá trị mạnh ở Render dashboard
      # (sync:false). Nếu KHÔNG đặt ADMIN_PASSWORD, bootstrap chỉ tạo admin mới với
      # mật khẩu dev yếu + cảnh báo (KHÔNG dùng cho bản deploy thật).
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
