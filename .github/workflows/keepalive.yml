# SPEC-FACTORY-020 — chống NGỦ hạ tầng free-tier.
# Ping endpoint chạm DB của backend LIVE (/api/v1/exams: GET public, query bảng exams mỗi
# request, không cache) 3 lần/tuần → vừa đánh thức Render (spin-down 15') vừa tính là hoạt
# động cho Supabase (free PAUSE sau ~7 ngày idle; margin 2-3 ngày nếu lỡ mất 1 run).
#
# Ghi chú vận hành:
#   - GitHub tự vô hiệu hoá scheduled workflow sau 60 ngày repo KHÔNG có commit (báo qua 1
#     email). Repo đang phát triển nên ít nguy cơ; nếu đóng băng >1 tháng thì bấm re-enable
#     hoặc thêm 1 lớp ping ngoài (UptimeRobot/cron-job.org free ping cùng URL).
#   - 1-2 tuần đầu sau khi chuyển DB, xem dashboard Supabase (project status) xác nhận không
#     cảnh báo pause; nếu vẫn báo idle, đổi bước ping sang REST gateway Supabase (cần secret).
#   - Chỉ chạy theo lịch / bấm tay (workflow_dispatch) — KHÔNG chạy khi push.
name: keepalive

on:
  schedule:
    # 01:00 UTC thứ 2 + thứ 5 + thứ 7 (~08:00 giờ VN)
    - cron: "0 1 * * 1,4,6"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # Lần 1 có thể timeout khi service đang ngủ — không để bước này làm đỏ job.
      - name: Wake Render
        continue-on-error: true
        run: curl -sS -m 90 -o /dev/null -w "wake attempt: HTTP %{http_code}\n" "https://toeic-backend-5n57.onrender.com/api/v1/exams"
      - name: Ping endpoint chạm DB (thử tối đa 3 lần)
        run: |
          for i in 1 2 3; do
            sleep 30
            code=$(curl -sS -m 120 -o /dev/null -w "%{http_code}" "https://toeic-backend-5n57.onrender.com/api/v1/exams" || echo "000")
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
          done
          echo "keepalive FAILED sau 3 lan - kiem tra Render service + Supabase dashboard"
          exit 1
